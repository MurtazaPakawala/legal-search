services:
  - type: web
    name: isaacus-demo-app
    runtime: python
    plan: free
    buildCommand: |
      python -m pip install -r requirements.txt
      npm ci --include=dev
      npm run build
    startCommand: python -m uvicorn server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ISAACUS_API_KEY
        sync: false
